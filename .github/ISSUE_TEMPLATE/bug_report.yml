name: Bug report
description: Report a problem with the extension
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium / Edge
        - Firefox
        - Safari (macOS)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Browser & extension version
  - type: checkboxes
    id: privacy
    attributes:
      label: Confirmation
      options:
        - label: This report contains no secrets (API keys) from my export.
          required: true
